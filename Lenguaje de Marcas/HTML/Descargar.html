            <div class="descargas">
    <button id="btnTroll" type="button">Ver más versiones</button>
    <p id="mensajeFinal" style="display: none;">No hay más versiones</p>
</div>

<script>
    const btn = document.getElementById("btnTroll");
    const mensaje = document.getElementById("mensajeFinal");
    let clicks = 0;

    btn.addEventListener("click", () => {
        clicks++;

        if (clicks < 5) {
            const x = Math.floor(Math.random() * 300);
            const y = Math.floor(Math.random() * 150);

            btn.style.position = "relative";
            btn.style.left = x + "px";
            btn.style.top = y + "px";
        } else {
            btn.style.display = "none";
            mensaje.style.display = "block";
        }
    });
</script>
